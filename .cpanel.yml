deployment:
  tasks:
    # 1. Detect the branch manually within the script
    - export CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
    
    # 2. Set the path based on that branch
    - |
      if [ "$CURRENT_BRANCH" = "master" ]; then
        export DEPLOYPATH=/home/ceylontr/public_html
      else
        export DEPLOYPATH=/home/ceylontr/development
      fi

    # Ensure target directory exists
    - /bin/mkdir -p $DEPLOYPATH

    # Copy all project files to LIVE directory
    - /bin/cp -R . $DEPLOYPATH

    # Remove Git-related files from public directory
    - /bin/rm -rf $DEPLOYPATH/.git
    - /bin/rm -rf $DEPLOYPATH/.gitignore